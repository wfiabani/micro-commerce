server:
  port: 8081

spring:
  application:
    name: commerce
  datasource:
    url: ${PG_DATASOURCE_URL}
    username: ${PG_DATASOURCE_USERNAME}
    password: ${PG_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        ddl-auto: update
